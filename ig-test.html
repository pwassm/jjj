<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG embed test</title>
<style>
  body { font-family: monospace; background:#0a0a14; color:#ddd; margin:0; padding:12px; }
  h1 { color:#8ef; font-size:14px; margin:0 0 10px; }
  .lbl { color:#888; font-size:11px; margin:8px 0 4px; }
  .url { color:#5bf; font-size:11px; word-break:break-all; margin-bottom:6px; }
  iframe { display:block; width:100%; max-width:540px; height:780px; background:#000; border:1px solid #333; }
  .row { margin-bottom:20px; }
  a { color:#8ef; }
</style>
</head>
<body>

<h1>Instagram embed test</h1>

<div class="row">
  <div class="lbl">Reel — sandbox iframe, no JS API:</div>
  <div class="url">https://www.instagram.com/reel/DYy3hZ6tkPw/embed/</div>
  <iframe
    src="https://www.instagram.com/reel/DYy3hZ6tkPw/embed/"
    frameborder="0"
    scrolling="no"
    allowtransparency="true"
    allow="autoplay; encrypted-media; picture-in-picture; web-share"
    allowfullscreen></iframe>
</div>

<div class="row">
  <div class="lbl">Same URL, captioned variant (/captioned/embed/):</div>
  <div class="url">https://www.instagram.com/reel/DYy3hZ6tkPw/embed/captioned/</div>
  <iframe
    src="https://www.instagram.com/reel/DYy3hZ6tkPw/embed/captioned/"
    frameborder="0"
    scrolling="no"
    allowtransparency="true"
    allow="autoplay; encrypted-media; picture-in-picture; web-share"
    allowfullscreen></iframe>
</div>

<div class="lbl">If neither plays, fallback tap-out:</div>
<a href="https://www.instagram.com/reels/DYy3hZ6tkPw/" target="_blank" rel="noopener">↗ Open on Instagram</a>

</body>
</html>
